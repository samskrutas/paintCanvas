<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art Board</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .game-container {
            text-align: center;
            background-color: #1e293b;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            margin-top: 0;
            color: #f8fafc;
            font-size: 28px;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #334155;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .tool {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            font-weight: bold;
        }

        input[type="color"] {
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }

        #clear-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }

        .grid-board {
            display: grid;
            grid-template-columns: repeat(20, 20px);
            grid-template-rows: repeat(20, 20px);
            gap: 1px;
            background-color: #475569;
            padding: 2px;
            border-radius: 6px;
            margin: 0 auto;
            width: 420px;
            height: 420px;
            touch-action: none;
        }

        .cell {
            background-color: #ffffff;
            cursor: pointer;
            transition: background-color 0.05s ease;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🎨 Pixel Art Board 🖌️</h1>
        
        <div class="toolbar">
            <div class="tool">
                <label for="colorPicker">Color:</label>
                <input type="color" id="colorPicker" value="#ef4444">
            </div>
            <button id="clear-btn" onclick="clearGrid()">🗑️ Clear Board</button>
        </div>

        <div id="pixel-grid" class="grid-board"></div>
    </div>

    <script>
        const gridContainer = document.getElementById('pixel-grid');
        const colorPicker = document.getElementById('colorPicker');

        let isDrawing = false;

        document.body.onpointerdown = () => (isDrawing = true);
        document.body.onpointerup = () => (isDrawing = false);

        createGrid();

        function createGrid() {
            gridContainer.innerHTML = ""; 
            
            for (let i = 0; i < 400; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                cell.addEventListener('pointerdown', (e) => {
                    e.preventDefault();
                    cell.style.backgroundColor = colorPicker.value;
                });

                cell.addEventListener('pointerenter', () => {
                    if (isDrawing) {
                        cell.style.backgroundColor = colorPicker.value;
                    }
                });

                gridContainer.appendChild(cell);
            }
        }

        function clearGrid() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.style.backgroundColor = '#ffffff';
            });
        }
    </script>
</body>
</html>
